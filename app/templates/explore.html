{% extends 'base.html' %}
{% block title %}pwnamap — Explore{% endblock %}
{% block page_id %}explore{% endblock %}
{% block content %}
  <h1>Database Explorer</h1>
  <p style="color: var(--text-dim); margin-bottom: var(--space-4);">Filter and search every network in your database.</p>

  <form id="explore-filters" class="filter-bar" autocomplete="off">
    <div class="form-field" style="margin: 0;">
      <label class="form-label" for="networkType">Type</label>
      <select id="networkType" name="network_type" class="form-select">
        <option value="">All</option>
        <option value="WIFI" selected>WIFI</option>
        <option value="BT">Bluetooth</option>
        <option value="BLE">BLE</option>
        <option value="GSM">GSM</option>
        <option value="LTE">LTE</option>
      </select>
    </div>

    <div class="form-field" style="margin: 0;">
      <label class="form-label" for="encryption">Encryption</label>
      <select id="encryption" name="encryption" class="form-select">
        <option value="">All</option>
        <option value="WPA3">WPA3</option>
        <option value="WPA2">WPA2</option>
        <option value="WPA">WPA</option>
        <option value="WEP">WEP</option>
        <option value="None">None</option>
      </select>
    </div>

    <div class="form-field" style="margin: 0;">
      <label class="form-label" for="searchInputName">Name (SSID)</label>
      <input id="searchInputName" name="name" type="search" class="form-input" placeholder="e.g. WiFi 2 Guest">
    </div>

    <div class="form-field" style="margin: 0;">
      <label class="form-label" for="searchInputNetworkId">MAC / BSSID</label>
      <input id="searchInputNetworkId" name="network_id" type="search" class="form-input" placeholder="e.g. f8:e0:79:af:57:eb">
    </div>

    <div class="form-field" style="margin: 0; display: flex; align-items: end; gap: var(--space-2);">
      <label style="display: flex; gap: var(--space-2); align-items: center; cursor: pointer;">
        <input id="excludeNoSSID" type="checkbox" checked>
        <span>Hide "no SSID"</span>
      </label>
    </div>

    <div class="form-field" style="margin: 0; display: flex; gap: var(--space-2); align-items: end;">
      <button id="searchButton" type="submit" class="btn btn--primary" style="flex: 1;">Search</button>
      <button id="clearButton" type="reset" class="btn btn--ghost">Clear</button>
    </div>
  </form>

  <div id="map" class="map-container" role="application" aria-label="Filtered network map"></div>
{% endblock %}
{% block scripts %}{{ bundle('explore') | safe }}{% endblock %}
