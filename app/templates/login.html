{% extends 'base.html' %}
{% block title %}pwnamap — Login{% endblock %}
{% block content %}
  <div style="max-width: 420px; margin: var(--space-8) auto;">
    <h1 style="text-align: center;">Sign in</h1>
    <p style="text-align: center; color: var(--text-dim); margin-bottom: var(--space-5);">pwnamap — self-hosted companion for your pwnagotchi</p>

    {% if error %}
      <div class="card" style="border-left: 4px solid var(--danger); margin-bottom: var(--space-4);">
        <strong style="color: var(--danger);">Sign-in failed</strong>
        <div style="color: var(--text-dim); margin-top: var(--space-1);">{{ error }}</div>
      </div>
    {% endif %}

    <form id="login-form" method="post" action="/login" class="card">
      <div class="form-field">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" type="text" class="form-input" autocomplete="username" required autofocus>
      </div>
      <div class="form-field">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-input" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn--primary btn--block">Sign in</button>
    </form>
  </div>
{% endblock %}
{% block scripts %}{{ bundle('login') | safe }}{% endblock %}
