{% extends 'base.html' %}
{% block title %}pwnamap — Setup{% endblock %}
{% block content %}
  <div style="max-width: 480px; margin: var(--space-8) auto;">
    <h1 style="text-align: center;">Welcome to pwnamap</h1>
    <p style="text-align: center; color: var(--text-dim); margin-bottom: var(--space-5);">First-run setup — create your admin account.</p>

    <form id="setup-form" method="post" action="/setup" class="card">
      <div class="form-field">
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" type="text" class="form-input" minlength="3" required autofocus>
      </div>
      <div class="form-field">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-input" minlength="8" required>
        <div class="form-hint">At least 8 characters.</div>
      </div>
      <button type="submit" class="btn btn--primary btn--block">Create account</button>
    </form>
  </div>
{% endblock %}
{% block scripts %}{{ bundle('setup') | safe }}{% endblock %}
