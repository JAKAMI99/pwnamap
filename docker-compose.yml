# vibecoded: fixed healthcheck (curl missing in alpine), env_file for secrets,
# named volume instead of bind-mount (works on any host filesystem)
services:
  pwnamap:
    build: .
    image: pwnamap:latest
    ports:
      - "1337:1337"
    volumes:
      - pwnamap_data:/app/app/data
    restart: on-failure
    env_file:
      - .env  # WIGLE_API_KEY, etc. — never commit this file
    environment:
      APP_VERSION: "0.9.0"
      LOG_LEVEL: "INFO"
      PYTHONUNBUFFERED: "1"
      PORT: "1337"
    healthcheck:
      # vibecoded: Dockerfile now installs curl, so this works
      test: ["CMD-SHELL", "curl -fsS http://localhost:1337/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s  # give gunicorn time to boot workers
    # vibecoded: explicit security opts; on Unraid you may need to remove user
    # if the data dir is on a network share with different ownership
    # user: "1000:1000"

volumes:
  pwnamap_data:
    name: pwnamap_data
