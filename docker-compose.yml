# vibecoded: fixed healthcheck, env_file for secrets, BACKWARD-COMPATIBLE data volume.
#
# DB migration: the old compose used a bind-mount on `${HOME}/.docker-data`.
# This new version uses a NAMED VOLUME (pwnamap_data) which Docker manages
# automatically. If you're upgrading from a pre-vibecoded install, your old
# DB lives at `${HOME}/.docker-data/pwnamap.db`. Run `./migrate-data.sh`
# ONCE to copy it into the new volume before starting pwnamap.
#
# If you prefer to keep using your existing bind-mount path, change the
# `volumes:` entry below to:
#   - "${HOME}/.docker-data:/app/app/data"

services:
  pwnamap:
    build: .
    image: pwnamap:latest
    ports:
      - "1337:1337"
    volumes:
      - pwnamap_data:/app/app/data
    restart: on-failure
    env_file:
      - .env  # WIGLE_API_KEY, etc. -- never commit this file
    environment:
      APP_VERSION: "0.9.0"
      LOG_LEVEL: "INFO"
      PYTHONUNBUFFERED: "1"
      PORT: "1337"
      # vibecoded: DATA_DIR must match the volume mount target.
      DATA_DIR: "/app/app/data"
    healthcheck:
      # vibecoded: Dockerfile now installs curl, so this works
      test: ["CMD-SHELL", "curl -fsS http://localhost:1337/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s  # give gunicorn time to boot workers
    # vibecoded: explicit security opts; on Unraid you may need to remove user
    # if the data dir is on a network share with different ownership
    # user: "1000:1000"

volumes:
  pwnamap_data:
    name: pwnamap_data
